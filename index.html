<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rider's Cockpit - Control Center</title>
    <style>
        /* --- Reset & Base --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none; /* Cegah teks terseleksi */
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            height: 100vh;
            overflow: hidden; /* Lock screen */
            display: flex;
            flex-direction: column;
            color: #333;
        }

        /* --- Frutiger Aero Aesthetics (Global) --- */
        .glossy-base {
            background: linear-gradient(to bottom, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.2) 100%);
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.2);
            backdrop-filter: blur(4px);
        }

        /* --- Header / Status Bar --- */
        header {
            padding: 15px;
            text-align: center;
            height: 15vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            font-weight: 600;
        }

        /* --- Main Content (Grid) --- */
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 Kolom */
            grid-template-rows: 1fr 1fr;    /* 2 Baris */
            gap: 15px;
            padding: 15px;
            height: 85vh;
        }

        /* --- Control Cards --- */
        .card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: transform 0.1s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        /* Efek Tekan --- */
        .card:active {
            transform: scale(0.95);
        }

        /* Efek Glossy / Cahaya --- */
        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
            opacity: 0.3;
            transform: rotate(30deg);
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 10px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .label {
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .status-text {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.8);
            margin-top: 5px;
        }

        /* --- Specific Card Styles --- */
        #card-music {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            grid-column: 1 / -1; /* Full width row 1 */
        }

        #card-bass {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
        }

        #card-wa {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
        }

        #card-mute {
            background: linear-gradient(135deg, #fab1a0 0%, #e17055 100%);
        }

        /* --- Audio Player Element --- */
        #audio-element {
            display: none; /* Sembunyikan player standar */
        }

        /* --- Visual Indicator untuk Bass Boost --- */
        .led-indicator {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background-color: #555; /* Default mati */
            border: 2px solid rgba(255,255,255,0.5);
            margin-top: 10px;
            box-shadow: inset 0 2px 3px rgba(0,0,0,0.5);
            transition: background-color 0.3s ease;
        }

        .led-active {
            background-color: #2eff2e; /* Hijau menyala */
            box-shadow: 0 0 10px #2eff2e, inset 0 2px 3px rgba(255,255,255,0.5);
        }

    </style>
</head>
<body>

    <header>
        <h1 class="glossy-base" style="padding: 10px 20px;">RIDER'S COCKPIT</h1>
    </header>

    <main>
        <div id="card-music" class="card glossy-base">
            <div class="icon">🎵</div>
            <div class="label">Music Player</div>
            <div class="status-text" id="music-status">Isi File Musik & Tap to Play</div>
            <audio id="audio-element" controls src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
        </div>

        <div id="card-bass" class="card glossy-base">
            <div class="icon">🔊</div>
            <div class="label">Bass Boost</div>
            <div class="status-text">Perbaiki Suara Intercom</div>
            <div class="led-indicator" id="bass-led"></div>
        </div>

        <div id="card-wa" class="card glossy-base">
            <div class="icon">📱</div>
            <div class="label">Jawab WA</div>
            <div class="status-text">Trigger Makro HP</div>
        </div>

        <div id="card-mute" class="card glossy-base">
            <div class="icon">🔇</div>
            <div class="label">Mute</div>
            <div class="status-text">Vol Musik 10%</div>
        </div>
    </main>

    <script>
        // --- Setup State ---
        let audioContext;
        let source;
        let bassFilter;
        let isBassBoosted = false;
        let isMuted = false;
        const audioElement = document.getElementById('audio-element');

        // --- DOM Elements ---
        const cardMusic = document.getElementById('card-music');
        const cardBass = document.getElementById('card-bass');
        const cardWa = document.getElementById('card-wa');
        const cardMute = document.getElementById('card-mute');
        const musicStatus = document.getElementById('music-status');
        const bassLed = document.getElementById('bass-led');

        // --- Initialize Web Audio API (Harus User Gesture) ---
        function initAudio() {
            if (audioContext) return; // Sudah diinisialisasi

            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            source = audioContext.createMediaElementSource(audioElement);

            // Buat BiquadFilterNode untuk Bass (Lowshelf)
            bassFilter = audioContext.createBiquadFilter();
            bassFilter.type = 'lowshelf';
            bassFilter.frequency.value = 250; // Frekuensi batas bass
            bassFilter.gain.value = 0;       // Default tidak ada boost

            // Hubungkan Jalur: Source -> Filter -> Destination (Speaker)
            source.connect(bassFilter);
            bassFilter.connect(audioContext.destination);
        }

        // --- Logic: 1. Play/Pause Musik ---
        cardMusic.addEventListener('click', () => {
            initAudio(); // Pastikan AudioContext jalan

            if (audioElement.paused) {
                audioElement.play();
                musicStatus.innerText = "Playing...";
            } else {
                audioElement.pause();
                musicStatus.innerText = "Paused";
            }
        });

        // --- Logic: 2. Bass Boost Toggle (Solusi Cempreng) ---
        cardBass.addEventListener('click', () => {
            if (!audioContext) {
                alert('Putar musik dulu untuk mengaktifkan filter.');
                return;
            }

            isBassBoosted = !isBassBoosted;

            if (isBassBoosted) {
                // Aktifkan Boost (Tingkatkan Gain di Frekuensi Rendah)
                bassFilter.gain.value = 15; // +15dB (Sesuaikan ini)
                bassLed.classList.add('led-active');
                console.log("Bass Boost Aktif (+15dB)");
            } else {
                // Matikan Boost (Gain = 0)
                bassFilter.gain.value = 0;
                bassLed.classList.remove('led-active');
                console.log("Bass Boost Mati (Flat)");
            }
        });

        // --- Logic: 3. Jawab WA (Placeholder HTTP Request ke MacroDroid) ---
        cardWa.addEventListener('click', () => {
            console.log("Memicu HTTP Request ke MacroDroid (Localhost)...");
            musicStatus.innerText = "Memicu Jawab WA...";

            /*
              Contoh Implementasi Nanti:
              (Asumsi MacroDroid mendengarkan di http://localhost:8080/answer_wa)

              fetch('http://localhost:8080/answer_wa')
                .then(response => console.log('Macro Triggered'))
                .catch(err => console.error('Gagal trigger Makro:', err));
            */
            
            alert('Fitur ini butuh konfigurasi MacroDroid di HP kamu untuk menangkap sinyal HTTP dari browser ini.');
        });

        // --- Logic: 4. Quick Mute (Fading Volume) ---
        cardMute.addEventListener('click', () => {
            isMuted = !isMuted;

            if (isMuted) {
                // Set Volume rendah (bukan mute total agar navigasi terdengar)
                audioElement.volume = 0.1; 
                cardMute.style.opacity = '0.5';
                console.log("Volume Musik 10%");
            } else {
                // Balikkan Volume Normal
                audioElement.volume = 1.0;
                cardMute.style.opacity = '1';
                console.log("Volume Musik 100%");
            }
        });

    </script>
</body>
</html>
